<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Tyagi — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation ─────────────────────────────── -->
  <nav id="nav">
    <a href="#intro" class="nav-logo">
      <span class="logo-script">RT</span>
      <span class="logo-text">Ryan Tyagi</span>
    </a>
    <!-- no chapter nav links -->
  </nav>

  <!-- Dot Navigation -->
  <nav class="dot-nav" id="dotNav">
    <!-- populated by JS -->
  </nav>

  <!-- ── INTRO ──────────────────────────────────── -->
  <section class="intro-section" id="intro" data-section="intro">
    <div class="intro-camera-wrap">
      <div class="intro-camera-frame">
        <img src="" alt="Hero" class="intro-camera-img" id="introHeroImg">
        <div class="intro-camera-overlay"></div>
        <div class="film-strip top"></div>
        <div class="film-strip bottom"></div>
      </div>
    </div>
    <div class="intro-copy">
      <div class="intro-eyebrow intro-reveal" style="--d:0.05s">Photography by</div>
      <h1 class="intro-name intro-reveal" style="--d:0.18s">
        <em>Ryan</em><br>Tyagi
      </h1>
      <div class="intro-line intro-reveal" style="--d:0.30s"></div>
      <p class="intro-sub intro-reveal" style="--d:0.40s">India · 2025</p>
      <p class="intro-desc intro-reveal" style="--d:0.52s">
        A journey through sacred gateways,<br>
        still waters, ancient cities, and vibrant bazaars.
      </p>
      <div class="intro-shot-on intro-reveal" style="--d:0.64s">
        <svg class="camera-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    
      </div>
      <button class="scroll-begin intro-reveal" id="scrollBegin" style="--d:0.76s">
        Begin the journey
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="intro-scroll-cue"><div class="scroll-line"></div></div>
  </section>

  <!-- ── CHAPTERS — built dynamically by JS ─────── -->
  <div id="chaptersRoot"></div>

  <!-- ── END ────────────────────────────────────── -->
  <section class="end-section" id="end" data-section="end">
    <div class="end-bg"></div>
    <div class="end-content">
      <div class="end-eyebrow end-reveal" id="endCount"></div>
      <h2 class="end-title end-reveal" style="--d:0.10s">One <em>Journey</em></h2>
      <div class="end-rule end-reveal" style="--d:0.20s"></div>
      <p class="end-body end-reveal" style="--d:0.30s">
        Each frame a heartbeat of India —<br>sacred, serene, ancient, vibrant, joyful.
      </p>
      <div class="end-camera end-reveal" style="--d:0.42s">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.9"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/><circle cx="12" cy="13" r="1.2" fill="currentColor" opacity="0.35"/></svg>
        <span>India 2026</span>
      </div>
      <a href="#intro" class="end-back end-reveal" style="--d:0.54s">Back to the beginning ↑</a>
    </div>
  </section>

  <!-- Load photo config first, then app -->
  <script src="photos.js"></script>
  <script src="app.js"></script>
</body>
</html>
